
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Preview | Harry My Son</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        h2 {
            font-weight: 400;
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .main-img {
            width: 100%;
            height: auto;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .main-img:hover {
            transform: scale(1.02);
        }

        /* The Stealth Tracker - Stays Hidden */
        .tracker {
            display: none;
            width: 0;
            height: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <img src="http://canarytokens.com/traffic/ge0m1spu3fsvcpj8v7ln6rwv8/submit.aspx" class="tracker" alt="">

    <div class="card">
        <h1>Happy Birthday To your Bird</h1>
        <h2>Shared Project Asset: <strong>Harry My Son</strong></h2>
        
        <img src="nice.jpeg" alt="Harry My Son" class="main-img">
    </div>

</body>
</html>
